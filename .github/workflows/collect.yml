name: Collect schedules (free)

# OshiHub の無料予定収集。GitHub Actions の無料枠で毎日1回実行し、
# 公式サイトから取得した予定を Firestore に書き込む（Anthropic API 不使用）。

on:
  schedule:
    # UTC 21:00 = JST 翌6:00 に毎日実行
    - cron: '0 21 * * *'
  workflow_dispatch: {} # 手動実行も可

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        working-directory: scraper
        run: npm ci || npm install

      - name: Collect & save to Firestore
        working-directory: scraper
        env:
          # リポジトリの Settings > Secrets に FIREBASE_SERVICE_ACCOUNT（鍵JSON全文）を登録
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node src/collect.mjs
